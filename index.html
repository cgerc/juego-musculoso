<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego: Músculo 💪</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor-juego">
        <h1>💪 ¡Juego MÚSCULO! 💪</h1>
        <p>¡Muévete con las flechas ⬅️ ➡️ hacia el portal para entrenar!</p>
        
        <div class="info-progreso">
            <span>🚪 Portal: <span id="numero-portal">1</span> / 10</span> | 
            <span>Fuerza: <span id="fuerza-emojis"></span></span>
        </div>

        <div class="pista">
            <div id="personaje" class="personaje-azul">🟦</div>
            <div id="portal" class="portal-visual">🚪</div>
        </div>

        <p id="estado-texto" style="font-weight: bold; color: #555;">¡Camina hacia el portal!</p>

        <div id="zona-desafio" class="zona-desafio oculta">
            <h2 id="pregunta-suma">¿Cuánto es?</h2>
            <input type="number" id="respuesta-usuario" placeholder="?" min="0">
            <button onclick="comprobarRespuesta()">¡Responder! 🚀</button>
        </div>

        <p id="mensaje-feedback" class="mensaje"></p>
    </div>

    <script>
        let portalActual = 1;
        let musculo = 0;
        let num1 = 0;
        let num2 = 0;
        let respuestaCorrecta = 0;
        
        // Variables para el movimiento
        let posicionPersonaje = 20; // Posición inicial en píxeles
        const personaje = document.getElementById("personaje");
        const juegoActivo = true;
        let esperandoRespuesta = false;

        // Escuchar las teclas del teclado
        window.addEventListener("keydown", function(evento) {
            // Si el niño está respondiendo una suma, no se puede mover hasta que termine
            if (esperandoRespuesta || portalActual > 10) return;

            if (evento.key === "ArrowRight" || evento.key === "d") {
                if (posicionPersonaje < 340) { // Límite derecho de la pista
                    posicionPersonaje += 20;
                    personaje.style.left = posicionPersonaje + "px";
                }
            }
            if (evento.key === "ArrowLeft" || evento.key === "a") {
                if (posicionPersonaje > 10) { // Límite izquierdo
                    posicionPersonaje -= 20;
                    personaje.style.left = posicionPersonaje + "px";
                }
            }

            // REVISAR SI TOCÓ EL PORTAL (El portal está cerca de los 330px)
            if (posicionPersonaje >= 320) {
                esperandoRespuesta = true; // Pausa el movimiento
                activarDesafioPortal();
            }
        });

        function activarDesafioPortal() {
            document.getElementById("zona-desafio").classList.remove("oculta");
            document.getElementById("estado-texto").innerText = "🧠 ¡El portal está cerrado! Resuelve la suma para cruzar.";
            
            // Generar la suma
            num1 = Math.floor(Math.random() * 5) + 1;
            num2 = Math.floor(Math.random() * 4) + 1;
            respuestaCorrecta = num1 + num2;
            
            document.getElementById("pregunta-suma").innerText = `¿Cuánto es ${num1} + ${num2}?`;
            document.getElementById("respuesta-usuario").value = "";
            document.getElementById("respuesta-usuario").focus(); // Pone el cursor listo para escribir
        }

        function comprobarRespuesta() {
            const respuestaInput = document.getElementById("respuesta-usuario").value;
            const mensaje = document.getElementById("mensaje-feedback");
            const fuerzaEspacio = document.getElementById("fuerza-emojis");

            if (respuestaInput === "") return;

            if (parseInt(respuestaInput) === respuestaCorrecta) {
                musculo++;
                portalActual++;
                mensaje.innerText = " Graham! 🎉 ¡Correcto! El portal te deja pasar.";
                mensaje.style.color = "green";
                
                // El personaje crece
                let nuevoTamano = 30 + (musculo * 8);
                personaje.style.fontSize = nuevoTamano + "px";
                fuerzaEspacio.innerText = "💪".repeat(musculo);
            } else {
                portalActual++;
                mensaje.innerText = `❌ ¡Oh no! El portal se tragó tu energía. Era ${respuestaCorrecta}.`;
                mensaje.style.color = "red";
            }

            // Ocultar zona de preguntas y regresar al personaje al inicio
            document.getElementById("zona-desafio").classList.add("oculta");
            
            setTimeout(() => {
                mensaje.innerText = "";
                if (portalActual <= 10) {
                    document.getElementById("numero-portal").innerText = portalActual;
                    document.getElementById("estado-texto").innerText = "¡Camina otra vez hacia el siguiente portal! ➡️";
                    // Regresa al personaje a la izquierda para el siguiente nivel
                    posicionPersonaje = 20;
                    personaje.style.left = posicionPersonaje + "px";
                    esperandoRespuesta = false; // Permite moverlo otra vez
                } else {
                    // Fin del juego
                    document.getElementById("estado-texto").innerText = "🏆 ¡GANASTE EL JUEGO DE MÚSCULO! 🏆";
                    document.getElementById("mensaje-feedback").innerText = "¡Tu personaje azul es el más fuerte del mundo! 🎉";
                    personaje.style.left = "170px"; // Lo centra al final
                }
            }, 2500);
        }
    </script>
</body>
</html>
